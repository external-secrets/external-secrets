suite: test pod distribution budget deployment
templates:
  - poddisruptionbudget.yaml
tests:
  - it: should set podDisruptionBudget to set value if given
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.nameOverride: custom-overridden-name
    asserts:
      - equal:
          path: metadata.name
          value: custom-overridden-name
  - it: should default podDisruptionBudget if not set
    set:
      podDisruptionBudget.enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-external-secrets-pdb
  - it: should render minAvailable when set to zero
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: 0
    asserts:
      - equal:
          path: spec.minAvailable
          value: 0
      - notExists:
          path: spec.maxUnavailable
  - it: should render maxUnavailable when set to zero
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.maxUnavailable: 0
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 0
      - notExists:
          path: spec.minAvailable
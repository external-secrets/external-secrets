apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  labels:
    external-secrets.io/component: controller
  name: artifactoryaccesstokens.generators.external-secrets.io
spec:
  group: generators.external-secrets.io
  names:
    categories:
    - external-secrets
    - external-secrets-generators
    kind: ArtifactoryAccessToken
    listKind: ArtifactoryAccessTokenList
    plural: artifactoryaccesstokens
    singular: artifactoryaccesstoken
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ArtifactoryAccessToken generates short-lived JFrog Artifactory
          access tokens.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ArtifactoryAccessTokenSpec defines configuration for generating
              JFrog Artifactory access tokens.
            properties:
              auth:
                description: Auth configures how ESO obtains or creates the Artifactory
                  token.
                maxProperties: 1
                minProperties: 1
                properties:
                  oidc:
                    description: OIDC exchanges a Kubernetes service account token
                      for an Artifactory access token.
                    properties:
                      applicationKey:
                        description: ApplicationKey is required when using application-scoped
                          OIDC configurations.
                        type: string
                      identityMappingName:
                        description: IdentityMappingName selects a specific identity
                          mapping.
                        type: string
                      includeReferenceToken:
                        description: IncludeReferenceToken requests a shortened reference
                          token in the response.
                        type: boolean
                      projectKey:
                        description: ProjectKey scopes the token to a JFrog project.
                        type: string
                      providerName:
                        description: ProviderName is the OIDC provider name configured
                          in JFrog Platform.
                        type: string
                      providerType:
                        description: ProviderType is the OIDC provider type. Defaults
                          to GenericOidc for Kubernetes.
                        type: string
                      serviceAccountRef:
                        description: ServiceAccountRef references the Kubernetes service
                          account used for OIDC exchange.
                        properties:
                          audiences:
                            description: |-
                              Audience specifies the `aud` claim for the service account token
                              If the service account uses a well-known annotation for e.g. IRSA or GCP Workload Identity
                              then this audiences will be appended to the list
                            items:
                              type: string
                            type: array
                          name:
                            description: The name of the ServiceAccount resource being
                              referred to.
                            maxLength: 253
                            minLength: 1
                            pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                            type: string
                          namespace:
                            description: |-
                              Namespace of the resource being referred to.
                              Ignored if referent is not cluster-scoped, otherwise defaults to the namespace of the referent.
                            maxLength: 63
                            minLength: 1
                            pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                            type: string
                        required:
                        - name
                        type: object
                    required:
                    - providerName
                    - serviceAccountRef
                    type: object
                  referenceToken:
                    description: ReferenceToken creates a scoped token using a bootstrap
                      identity or access token.
                    properties:
                      description:
                        description: Description is an optional description for the
                          generated token.
                        type: string
                      expiresIn:
                        description: ExpiresIn is the token lifetime in seconds.
                        format: int64
                        type: integer
                      includeReferenceToken:
                        description: IncludeReferenceToken requests a shortened reference
                          token in the response.
                        type: boolean
                      projectKey:
                        description: ProjectKey scopes the token to a JFrog project.
                        type: string
                      refreshable:
                        description: Refreshable marks the token as refreshable.
                        type: boolean
                      scope:
                        description: Scope defines the permissions granted to the
                          generated token.
                        type: string
                      token:
                        description: Token references a Secret containing a bootstrap
                          identity or access token.
                        properties:
                          key:
                            description: |-
                              A key in the referenced Secret.
                              Some instances of this field may be defaulted, in others it may be required.
                            maxLength: 253
                            minLength: 1
                            pattern: ^[-._a-zA-Z0-9]+$
                            type: string
                          name:
                            description: The name of the Secret resource being referred
                              to.
                            maxLength: 253
                            minLength: 1
                            pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                            type: string
                          namespace:
                            description: |-
                              The namespace of the Secret resource being referred to.
                              Ignored if referent is not cluster-scoped, otherwise defaults to the namespace of the referent.
                            maxLength: 63
                            minLength: 1
                            pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                            type: string
                        type: object
                    required:
                    - scope
                    - token
                    type: object
                type: object
              registry:
                description: |-
                  Registry is the Docker registry hostname used in dockerconfigjson templates.
                  Defaults to the hostname from URL.
                type: string
              url:
                description: URL is the JFrog Platform base URL (e.g. https://acme.jfrog.io).
                type: string
            required:
            - auth
            - url
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

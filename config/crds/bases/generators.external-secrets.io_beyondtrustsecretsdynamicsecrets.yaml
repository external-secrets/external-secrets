apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  labels:
    external-secrets.io/component: controller
  name: beyondtrustsecretsdynamicsecrets.generators.external-secrets.io
spec:
  group: generators.external-secrets.io
  names:
    categories:
    - external-secrets
    - external-secrets-generators
    kind: BeyondtrustSecretsDynamicSecret
    listKind: BeyondtrustSecretsDynamicSecretList
    plural: beyondtrustsecretsdynamicsecrets
    singular: beyondtrustsecretsdynamicsecret
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BeyondtrustSecretsDynamicSecret represents a generator that requests
          dynamic credentials from BeyondtrustSecrets
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BeyondtrustSecretsDynamicSecretSpec defines the desired spec
              for BeyondtrustSecrets dynamic generator.
            properties:
              controller:
                description: Controller selects the controller that should handle
                  this generator
                type: string
              provider:
                description: Provider contains the BeyondtrustSecrets provider configuration
                  (apiUrl, siteId, auth)
                properties:
                  auth:
                    description: Auth configures how the Operator authenticates with
                      the BeyondtrustSecret API
                    properties:
                      apikey:
                        description: BeyondtrustSecretAuthSecretRef defines a reference
                          to a secret containing credentials for the BeyondtrustSecret
                          provider.
                        properties:
                          token:
                            description: The token is used for authentication.
                            properties:
                              key:
                                description: |-
                                  A key in the referenced Secret.
                                  Some instances of this field may be defaulted, in others it may be required.
                                maxLength: 253
                                minLength: 1
                                pattern: ^[-._a-zA-Z0-9]+$
                                type: string
                              name:
                                description: The name of the Secret resource being
                                  referred to.
                                maxLength: 253
                                minLength: 1
                                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                                type: string
                              namespace:
                                description: |-
                                  The namespace of the Secret resource being referred to.
                                  Ignored if referent is not cluster-scoped, otherwise defaults to the namespace of the referent.
                                maxLength: 63
                                minLength: 1
                                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                                type: string
                            type: object
                        required:
                        - token
                        type: object
                    required:
                    - apikey
                    type: object
                  caBundle:
                    description: CABundle is a base64-encoded CA certificate used
                      to validate the BeyondtrustSecrets API TLS certificate. If not
                      set, system roots are used.
                    format: byte
                    type: string
                  caProvider:
                    description: CAProvider points to a Secret or ConfigMap containing
                      a PEM-encoded certificate used to validate the BeyondtrustSecrets
                      API TLS certificate.
                    properties:
                      key:
                        description: The key where the CA certificate can be found
                          in the Secret or ConfigMap.
                        maxLength: 253
                        minLength: 1
                        pattern: ^[-._a-zA-Z0-9]+$
                        type: string
                      name:
                        description: The name of the object located at the provider
                          type.
                        maxLength: 253
                        minLength: 1
                        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                        type: string
                      namespace:
                        description: |-
                          The namespace the Provider type is in.
                          Can only be defined when used in a ClusterSecretStore.
                        maxLength: 63
                        minLength: 1
                        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                        type: string
                      type:
                        description: The type of provider to use such as "Secret",
                          or "ConfigMap".
                        enum:
                        - Secret
                        - ConfigMap
                        type: string
                    required:
                    - name
                    - type
                    type: object
                  folderPath:
                    description: Folder path to retrieve secret from
                    type: string
                  server:
                    description: Server configures the BeyondtrustSecret server connection
                      details
                    properties:
                      apiUrl:
                        type: string
                      apiVersion:
                        type: string
                      siteId:
                        type: string
                    required:
                    - apiUrl
                    type: object
                required:
                - auth
                type: object
              retrySettings:
                description: Used to configure http retries if failed
                properties:
                  maxRetries:
                    format: int32
                    type: integer
                  retryInterval:
                    type: string
                type: object
            required:
            - provider
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: proton-pass-example
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: proton-pass
  target:
    name: proton-pass-example
  data:
    # Fetch one field of one item. `key` is the item title (or `id:<ItemID>`),
    # `property` is the field label. `property` defaults to "password".
    - secretKey: db-password
      remoteRef:
        key: my-database
        property: password
    # Address an item unambiguously by ID when its title is not unique.
    - secretKey: api-token
      remoteRef:
        key: "id:aBcD1234EfGh5678"
        property: token
    # The reserved property "totp" returns the CURRENT one-time-password code
    # for a login that has TOTP configured. The otpauth seed itself is never
    # returned or written.
    - secretKey: mfa-code
      remoteRef:
        key: my-login
        property: totp
  # OR pull every field of a single item at once (the item title is the key).
  dataFrom:
    - extract:
        key: my-database
  # OR discover items by title and surface each one's default field ("password").
    - find:
        # Optional: restrict the search to one vault by name.
        path: Production
        name:
          regexp: "^prod-.*"

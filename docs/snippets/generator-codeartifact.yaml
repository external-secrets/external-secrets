apiVersion: generators.external-secrets.io/v1alpha1
kind: CodeArtifactAuthorizationToken
metadata:
  name: codeartifact-gen
spec:

  # specify aws region (mandatory)
  region: eu-west-1

  # name of the CodeArtifact domain (mandatory)
  domain: my-domain

  # 12-digit AWS account ID that owns the CodeArtifact domain (mandatory)
  domainOwner: "123456789012"

  # assume role with the given authentication credentials
  role: "arn:aws:iam::123456789012:role/codeartifact-readonly"

  # choose an authentication strategy
  # if no auth strategy is defined it falls back to using
  # credentials from the environment of the controller.
  auth:

    # option 1: static credentials
    # point to a secret that contains static credentials
    # like AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
    secretRef:
      accessKeyIDSecretRef:
        name: "my-aws-creds"
        key: "key-id"
      secretAccessKeySecretRef:
        name: "my-aws-creds"
        key: "access-secret"

    # option 2: IAM Roles for Service Accounts (uncomment below, remove secretRef above)
    # jwt:
    #   serviceAccountRef:
    #     name: "codeartifact-token-sync"

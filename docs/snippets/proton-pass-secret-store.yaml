---
apiVersion: v1
kind: Secret
metadata:
  name: proton-pass-pat
stringData:
  # The full Proton Pass Personal Access Token, in the form "pst_<token>::<key>".
  # Create it from the Proton Pass app or CLI. An editor/manager-role token is
  # required for PushSecret; a viewer-role token yields a read-only store.
  token: "pst_xxxxxxxxxxxxxxxx::yyyyyyyyyyyyyyyy"
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: proton-pass
spec:
  provider:
    protonpass:
      auth:
        personalAccessTokenSecretRef:
          name: proton-pass-pat
          key: token
          # For a ClusterSecretStore you MUST also set `namespace` here — this
          # provider does not support referent authentication.
      # Optional allow-list of vault names this store may use. When omitted,
      # every vault the token can access is used. An item title that is
      # ambiguous across the in-scope vaults is a hard error — address such an
      # item with `id:<ItemID>`. Writes (PushSecret) require the scope to
      # resolve to exactly one writable vault.
      vaults:
        - Production

apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: openbao-backend-aws-iam
spec:
  provider:
    openbao:
      server: "http://my.openbao.server:8200"
      path: secret
      version: v2
      namespace: <openbao_namespace>
      auth:
        iam:
          # Path where the AWS auth method is enabled in Vault, e.g: "aws/". Defaults to aws
          path: aws
          # AWS Region. Defaults to us-east-1
          region: us-east-1
          # OpenBao Role. In OpenBao, a role describes an identity with a set of permissions, groups, or policies you want to attach a user of the secrets engine
          openbaoRole: openbao-role-for-aws-iam-auth
          # Optional. Placeholder to supply header X-Vault-AWS-IAM-Server-ID. It is an additional (optional) header used by Vault IAM auth method to mitigate against different types of replay attacks.
          vaultAwsIamServerID: example-openbaoAwsIamServerID

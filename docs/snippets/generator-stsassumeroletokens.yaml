apiVersion: generators.external-secrets.io/v1alpha1
kind: STSAssumeRoleToken
metadata:
  name: sts-assume-role-gen
spec:

  # specify aws region (mandatory)
  region: eu-west-1

  # optional: IAM role ARN to assume.
  # When set, AssumeRole is called with the credentials from the auth source
  # and the resulting temporary credentials are returned.
  # When omitted, the credentials from auth are returned directly
  # (e.g. AssumeRoleWithWebIdentity credentials from IRSA).
  role: "arn:aws:iam::123456789012:role/my-role"

  # optional parameters for the AssumeRole call (only used when role is set)
  roleAssumptionParameters:
    # duration of the role session in seconds (default: 3600)
    sessionDuration: 1800
    # external ID for cross-account role trust
    externalId: "unique-external-id"
    # identifier for the role session
    roleSessionName: "external-secrets-session"

  # choose an authentication strategy.
  # if no auth strategy is defined it falls back to the credentials from
  # the environment of the controller (instance profile, pod identity, etc.).
  auth:

    # Option 1 — static credentials from a Kubernetes Secret
    secretRef:
      accessKeyIDSecretRef:
        name: "my-aws-creds"
        key: "key-id"
      secretAccessKeySecretRef:
        name: "my-aws-creds"
        key: "access-secret"

    # Option 2 — IRSA / service-account token (comment out secretRef above)
    # The service account must have the annotation:
    #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/irsa-role
    # jwt:
    #   serviceAccountRef:
    #     name: "my-service-account"

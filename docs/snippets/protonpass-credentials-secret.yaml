apiVersion: v1
kind: Secret
metadata:
  name: protonpass-credentials
  namespace: external-secrets
type: Opaque
stringData:
  password: "your-proton-password"
  # Optional: TOTP secret for 2FA (base32 encoded, e.g., JBSWY3DPEHPK3PXP)
  totp-secret: "YOUR_TOTP_SECRET_HERE"
  # Optional: Extra password if configured on your account
  # extra-password: "your-extra-password"

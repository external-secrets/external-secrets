apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: protonpass-example
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: protonpass
    kind: SecretStore
  target:
    name: my-secret
    creationPolicy: Owner
  data:
    # Fetch password field (default) from "Database Credentials" item
    - secretKey: db-password
      remoteRef:
        key: "Database Credentials"

    # Fetch specific field using property
    - secretKey: db-username
      remoteRef:
        key: "Database Credentials"
        property: "username"

    # Alternative: specify field in key path
    - secretKey: db-notes
      remoteRef:
        key: "Database Credentials/note"

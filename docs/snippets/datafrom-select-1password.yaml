apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: database-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: onepassword
  target:
    name: database-credentials
  dataFrom:
  - extract:
      key: database-item
    select:
    - names:
      - notesPlain
      - username
      - password
      operation: Exclude

apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: protonpass
  namespace: default
spec:
  provider:
    protonpass:
      # Your Proton account email
      username: "user@proton.me"
      # Vault name (strongly recommended - required for fetching item details)
      vault: "Personal"
      auth:
        secretRef:
          # Required: Reference to your Proton password
          password:
            name: protonpass-credentials
            key: password
          # Optional: TOTP secret for accounts with 2FA enabled
          totp:
            name: protonpass-credentials
            key: totp-secret
          # Optional: Extra password if configured
          # extraPassword:
          #   name: protonpass-credentials
          #   key: extra-password

apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gitea-secret-store
spec:
  provider:
    gitea:
      url: https://gitea.example.com
      organization: my-org
      # repository: my-repo  # Optional: scope to a specific repository
      auth:
        secretRef:
          name: gitea-token
          key: token

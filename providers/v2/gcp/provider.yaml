provider:
  name: gcp
  displayName: "GCP Provider"
  v2Package: "github.com/external-secrets/external-secrets/apis/provider/gcp/v2alpha1"

stores:
  - gvk:
      group: "provider.external-secrets.io"
      version: "v2alpha1"
      kind: "SecretManager"
    v1Provider: "github.com/external-secrets/external-secrets/providers/v1/gcp/secretmanager"
    v1ProviderFunc: "NewProvider"

configPackage: "."

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dbspecs.test.external-secrets.io
spec:
  group: test.external-secrets.io
  scope: Namespaced
  names:
    plural: dbspecs
    singular: dbspec
    kind: DBSpec
    listKind: DBSpecList
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - user
                - password
              properties:
                user:
                  type: string
                password:
                  type: string
                nestedFields:
                  type: array
                  items:
                    type: object
                    required:
                      - key
                      - val
                    properties:
                      key:
                        type: string
                      val:
                        type: string
            status:
              type: array
              items:
                type: object
                required:
                  - key
                  - val
                properties:
                  key:
                    type: string
                  val:
                    type: string
      subresources:
        status: {}
---
apiVersion: test.external-secrets.io/v1alpha1
kind: DBSpec
metadata:
  name: dbspec-sample
  namespace: default
spec:
  user: app-user
  password: super-secret
  nestedFields:
    - key: endpoint
      val: db.default.svc.cluster.local:5432
    - key: fqdn
      val: app-user:super-secret@db.default.svc.cluster.local
status:
  - key: endpoint
    val: db.default.svc.cluster.local:5432
  - key: fqdn
    val: app-user:super-secret@db.default.svc.cluster.local
  - key: rotationDate
    val: "2026-03-18T10:00:00Z"
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: namespaced-dbspec
  namespace: default
spec:
  provider:
    crd:
      serviceAccountName: crd-reader
      resource:
        group: test.external-secrets.io
        version: v1alpha1
        kind: DBSpec
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dbspec-secret
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: namespaced-dbspec
    kind: SecretStore
  target:
    name: dbspec-secret
  data:
    - secretKey: password
      remoteRef:
        key: dbspec-sample
        property: spec.password
    - secretKey: fqdn
      remoteRef:
        key: dbspec-sample
        property: spec.nestedFields[?key=='fqdn'].val | [0]

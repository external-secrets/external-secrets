---
apiVersion: test.external-secrets.io/v1alpha1
kind: DBSpec
metadata:
  name: dbspec-sample
  namespace: default
spec:
  user: app-user
  password: super-secret
  nestedFields:
    - key: endpoint
      val: db.default.svc.cluster.local:5432
    - key: fqdn
      val: app-user:super-secret@db.default.svc.cluster.local
status:
  - key: endpoint
    val: db.default.svc.cluster.local:5432
  - key: fqdn
    val: app-user:super-secret@db.default.svc.cluster.local
  - key: rotationDate
    val: "2026-03-18T10:00:00Z"
---
# CRD provider (SecretStore):
#   - remoteRef.key must be the object name only — '/' is invalid.
#   - Objects are read from the store's namespace (metadata.namespace), or from
#     remoteNamespace when set.
#   - whitelist.rules[].namespace is silently ignored (namespace is always fixed).
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: namespaced-dbspec
  namespace: default
spec:
  provider:
    crd:
      # Legacy mode: mint an in-cluster token for crd-reader.
      # For SecretStore the namespace field on serviceAccountRef is ignored;
      # the SA is always expected in the store's own namespace.
      serviceAccountRef:
        name: crd-reader
      resource:
        group: test.external-secrets.io
        version: v1alpha1
        kind: DBSpec
      # Optional whitelist — restrict readable objects/properties.
      # For SecretStore the namespace filter in each rule has no effect.
      #
      # whitelist:
      #   rules:
      #     - name: "^dbspec-.*$"          # only objects named "dbspec-*"
      #     - properties:
      #         - "^spec\\.password$"      # only the spec.password field
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dbspec-secret
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: namespaced-dbspec
    kind: SecretStore
  target:
    name: dbspec-secret
  data:
    - secretKey: password
      remoteRef:
        key: dbspec-sample
        property: spec.password
    - secretKey: fqdn
      remoteRef:
        key: dbspec-sample
        property: spec.nestedFields[?key=='fqdn'].val | [0]

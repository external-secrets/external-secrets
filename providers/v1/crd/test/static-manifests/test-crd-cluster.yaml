---
# Cluster-scoped DBSpec (same spec/status shape as namespaced DBSpec).
apiVersion: test.external-secrets.io/v1alpha1
kind: ClusterDBSpec
metadata:
  name: clusterdbspec-sample
spec:
  user: cluster-app-user
  password: cluster-super-secret
  nestedFields:
    - key: endpoint
      val: db.shared.svc.cluster.local:5432
    - key: fqdn
      val: cluster-app-user:cluster-super-secret@db.shared.svc.cluster.local
status:
  - key: endpoint
    val: db.shared.svc.cluster.local:5432
  - key: fqdn
    val: cluster-app-user:cluster-super-secret@db.shared.svc.cluster.local
  - key: rotationDate
    val: "2026-03-18T10:00:00Z"
---
# ClusterDBSpec is cluster-scoped: remoteRef.key is the object name (no '/').
# For a namespaced CR kind with ClusterSecretStore, use remoteRef.key "namespace/objectName";
# without '/', namespaced kinds require that form. Cluster-scoped kinds reject '/' in the key.
#
# The controller discovers API scope and uses cluster vs namespaced Get/List accordingly.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: cluster-dbspec
spec:
  provider:
    crd:
      # Legacy mode: mint an in-cluster token for crd-reader.
      # For ClusterSecretStore, namespace specifies where the SA lives.
      # Omitting namespace defaults to "default".
      serviceAccountRef:
        name: crd-reader
        namespace: default
      resource:
        group: test.external-secrets.io
        version: v1alpha1
        kind: ClusterDBSpec
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: clusterdbspec-secret
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cluster-dbspec
    kind: ClusterSecretStore
  target:
    name: clusterdbspec-secret
  data:
    - secretKey: password
      remoteRef:
        key: clusterdbspec-sample
        property: spec.password
    - secretKey: fqdn
      remoteRef:
        key: clusterdbspec-sample
        property: spec.nestedFields[?key=='fqdn'].val | [0]

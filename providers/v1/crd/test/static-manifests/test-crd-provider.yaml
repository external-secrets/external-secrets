---
# ConfigMap being used as the data source.
apiVersion: v1
kind: ConfigMap
metadata:
  name: my-app-config
  namespace: default
data:
  foo: "hello"
  bar: "world"

---
# SecretStore using the CRD provider.
# Targets ConfigMap (core group = "") authenticated as the crd-reader SA.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: test-crd
  namespace: default
spec:
  provider:
    crd:
      # Legacy mode: mint a short-lived in-cluster token for crd-reader.
      # For SecretStore the namespace field is optional (defaults to the store's namespace).
      serviceAccountRef:
        name: crd-reader
      resource:
        group: ""       # empty group = core Kubernetes API
        version: v1
        kind: ConfigMap

# For a remote API server, use the same server/auth/authRef fields as the
# Kubernetes provider. serviceAccountRef is then optional: when set the
# controller impersonates that SA on the remote cluster.
#
# Example — connect as an SA token, then impersonate a scoped reader:
#   crd:
#     server:
#       url: https://remote.k8s.example
#       caBundle: LS0tLS...
#     auth:
#       serviceAccount:           # SA that authenticates to the remote cluster
#         name: crd-bridge
#         namespace: default
#     serviceAccountRef:         # SA to impersonate on the remote cluster
#       name: crd-reader
#       namespace: default
#     remoteNamespace: default   # optional; namespaced Get/List target
#     resource:
#       group: example.io
#       version: v1alpha1
#       kind: Widget

---
# ExternalSecret that reads foo and bar from the ConfigMap and writes
# them as keys in a Kubernetes Secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: test-crd-secret
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: test-crd
    kind: SecretStore
  target:
    name: test-crd-secret
    creationPolicy: Owner
  data:
    - secretKey: foo
      remoteRef:
        key: my-app-config   # name of the ConfigMap object
        property: data.foo   # dot-notation path inside the object
    - secretKey: bar
      remoteRef:
        key: my-app-config
        property: data.bar

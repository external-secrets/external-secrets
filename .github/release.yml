# Configuration for automatically generating release notes on GitHub
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - skip-changelog

  categories:
    - title: "⚠️ Breaking Changes / Urgent Upgrade Notes"
      labels:
        - breaking-change
    - title: "🚀 Features & Improvements"
      labels:
        - kind/feature
        - kind/improvement
    - title: "🐛 Bug Fixes"
      labels:
        - kind/bug
    - title: "📖 Documentation"
      labels:
        - area/documentation
    - title: "🔒 Security"
      labels:
        - security
    - title: "🧹 Maintenance & Refactoring"
      labels:
        - kind/chore
        - kind/refactor
        - kind/maintenance
    - title: Dependencies
      labels:
        - area/dependencies
        - dependencies
    - title: General
      labels:
        - "*"
      exclude:
        labels:
          - breaking-change
          - kind/feature
          - kind/improvement
          - kind/bug
          - area/documentation
          - security
          - kind/chore
          - kind/refactor
          - kind/maintenance
          - area/dependencies
          - dependencies
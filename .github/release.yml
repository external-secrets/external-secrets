# Configuration for automatically generating release notes on GitHub
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - skip-changelog

  categories:
    - title: "⚠️ Breaking Changes / Urgent Upgrade Notes"
      labels:
        - breaking-change
    - title: "🚀 New Features"
      labels:
        - kind/feature
    - title: "🐛 Bug Fixes"
      labels:
        - kind/bug
    - title: "📖 Documentation"
      labels:
        - kind/documentation
    - title: "🔒 Security"
      labels:
        - security
    - title: General
      labels:
        - "*"
      exclude:
        labels:
          - dependencies
          - breaking-change
          - kind/feature
          - kind/bug
          - kind/documentation
          - security
    - title: Dependencies
      labels:
        - dependencies

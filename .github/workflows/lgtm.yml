# If someone with reviewer access comments "/lgtm" on a pull request, add lgtm label
name: LGTM Command
on:
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  lgtm-command:
    permissions:
      pull-requests: write  # for peter-evans/slash-command-dispatch to create PR reaction
      issues: write        # for adding labels and comments
      contents: read       # for reading CODEOWNERS.md
    runs-on: ubuntu-latest
    # Only run for PRs, not issue comments
    if: ${{ github.event.issue.pull_request }}
    steps:
    # Checkout repo to access CODEOWNERS.md
    - name: Checkout repository
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      with:
        sparse-checkout: |
          CODEOWNERS.md

    # Generate a GitHub App installation access token
    - name: Generate token
      id: generate_token
      uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
      with:
        app_id: ${{ secrets.APP_ID }}
        private_key: ${{ secrets.PRIVATE_KEY }}

    - name: Slash Command Dispatch
      uses: peter-evans/slash-command-dispatch@13bc09769d122a64f75aa5037256f6f2d78be8c4 # v4.0.0
      with:
        token: ${{ steps.generate_token.outputs.token }}
        reaction-token: ${{ secrets.GITHUB_TOKEN }}
        issue-type: pull-request
        commands: lgtm
        # QUESTION FOR REVIEWER: If I've understood correctly, we're limitted by the following 6 repo permission levels
        # none, read, triage, write, maintain and admin.
        # potentially you'll want to give 'triage' to the reviewers and that further hardens this workflow.
        # Obviously we still have permission checks in the workflow itself, but would be nice to have this extra level of security.
        permission: none

    - name: Process LGTM Command
      if: ${{ github.event.comment.body == '/lgtm' }}
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
      with:
        github-token: ${{ steps.generate_token.outputs.token }}
        script: |
          const organization = 'external-secrets';

          // Format as "@<organization>/<role>" so they are properly mentioned in the comment.
          const rolesToMentionOnLGTM = ['@external-secrets/maintainers', '@external-secrets/interim-maintainers'];

          const fs = require('fs');
          
          const commenter = context.payload.comment.user.login;
          const prNumber = context.payload.issue.number;
          const owner = context.repo.owner;
          const repo = context.repo.repo;


          // Parse CODEOWNERS.md file
          let codeownersContent;
          try {
            codeownersContent = fs.readFileSync('CODEOWNERS.md', 'utf8');
          } catch (error) {
            return;
          }

          // Extract team mappings from CODEOWNERS.md
          const teamMappings = [];
          codeownersContent.split('\n').forEach(line => {
            const trimmed = line.trim();
            if (!trimmed || trimmed.startsWith('#')) return;
            
            const match = trimmed.match(/^(\S+)\s+(.+)$/);
            if (match) {
              const [, pattern, teams] = match;
              teamMappings.push({
                pattern,
                teams: teams.split(/\s+/).filter(t => t.startsWith('@'))
              });
            }
          });

          // Get changed files in PR
          const filesResponse = await github.rest.pulls.listFiles({
            owner, repo, pull_number: prNumber
          });
          const changedFiles = filesResponse.data.map(f => f.filename);

          // Find all teams that own the changed files
          const ownersTeams = new Set();
          changedFiles.forEach(file => {
            teamMappings.forEach(mapping => {
              const { pattern, teams } = mapping;
              // Match pattern (handle both exact matches and directory patterns)
              if (file === pattern || 
                  file.startsWith(pattern.endsWith('/') ? pattern : pattern + '/') ||
                  pattern === '*') {
                teams.forEach(team => ownersTeams.add(team));
              }
            });
          });

          if (ownersTeams.size === 0) {
            return;
          }

          // Check if user is member of ANY owner team
          let userTeam = null;
          for (const team of ownersTeams) {
            const teamSlug = team.replace(`@${organization}/`, '');
            
            try {
              const response = await github.rest.teams.getMembershipForUserInOrg({
                org: organization,
                team_slug: teamSlug,
                username: commenter
              });
              if (response.data.state === 'active') {
                userTeam = team;
                break;
              }
            } catch (error) {
              // User not in this team, continue checking others
            }
          }

          if (!userTeam) {
            const teamsList = Array.from(ownersTeams).join(', ');
            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber,
              body: `@${commenter} You must be a member of one of the owner teams to use /lgtm.\n\nOwner teams for this PR: ${teamsList}`
            });
            return;
          }

          // Check if LGTM label already exists
          const labels = await github.rest.issues.listLabelsOnIssue({
            owner, repo, issue_number: prNumber
          });
          
          if (!labels.data.some(l => l.name === 'lgtm')) {
            await github.rest.issues.addLabels({
              owner, repo, issue_number: prNumber, labels: ['lgtm']
            });
            // Added LGTM label
          }

          // Add confirmation comment
          const mentionRoles = rolesToMentionOnLGTM.join(' ');
          await github.rest.issues.createComment({
            owner, repo, issue_number: prNumber,
            body: `✅ LGTM by @${commenter} \n\n${mentionRoles}`
          });

          // Successfully processed LGTM from ${commenter}
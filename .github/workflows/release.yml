name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version to release, e.g. v1.5.13'
        required: true
        default: 'v0.1.0'
      source_ref:
        description: 'source ref to publish from. E.g.: main'
        required: true
        default: 'main'

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

permissions:
  contents: read

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create a release, push new docs, and commit changelog
      pull-requests: write # to open a PR with the updated changelog
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve and validate ref
        id: resolve_ref
        env:
          SOURCE_REF: ${{ github.event.inputs.source_ref }}
        run: |
          set -e
          # Try to fetch the ref from remote
          if git fetch origin "$SOURCE_REF"; then
            # Remote ref exists, use it
            RESOLVED_SHA=$(git rev-parse "origin/$SOURCE_REF")
          elif git rev-parse --verify "$SOURCE_REF" >/dev/null 2>&1; then
            # Local ref exists (e.g., a tag)
            RESOLVED_SHA=$(git rev-parse "$SOURCE_REF")
          else
            echo "Error: ref '$SOURCE_REF' not found"
            exit 1
          fi
          echo "Resolved to SHA: $RESOLVED_SHA"
          echo "sha=$RESOLVED_SHA" >> $GITHUB_OUTPUT

      - name: Checkout validated ref
        env:
          RESOLVED_SHA: ${{ steps.resolve_ref.outputs.sha }}
        run: git checkout "$RESOLVED_SHA"

      - name: Create Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.event.inputs.version }}
          target_commitish: ${{ github.event.inputs.source_ref }}
          generate_release_notes: true
          body: |
            Image: `${{ env.IMAGE_NAME }}:${{ github.event.inputs.version }}`
            Image: `${{ env.IMAGE_NAME }}:${{ github.event.inputs.version }}-ubi`
            Image: `${{ env.IMAGE_NAME }}:${{ github.event.inputs.version }}-ubi-boringssl`
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Configure Git
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${GH_REPO}.git"

      - name: Update Docs
        if: github.ref == 'refs/heads/main'
        env:
          DOCS_VERSION: ${{ github.event.inputs.version }}
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: make docs.publish DOCS_ALIAS=latest

  changelog-pr:
    name: Create CHANGELOG PR
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write      # to commit changelog
      pull-requests: write # to open a PR with the updated changelog
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch Native Release Notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh api repos/${GH_REPO}/releases/tags/${VERSION} --jq '.body' > release_body.txt

      - name: Parse Release Notes from PR Bodies
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v7
        env:
          VERSION: ${{ github.event.inputs.version }}
        with:
          script: |
            const fs = require('fs');

            // Read the native GitHub release notes generated in the previous step
            const releaseBody = fs.readFileSync('release_body.txt', 'utf8');
            
            // Extract all PR numbers from the text (matching the /pull/1234 format at the end of the line)
            const prRegex = /\/pull\/(\d+)/g;
            const prNumbers = [];
            let match;
            while ((match = prRegex.exec(releaseBody)) !== null) {
              prNumbers.push(parseInt(match[1]));
            }
            
            // Remove duplicates just in case
            const uniquePRs = [...new Set(prNumbers)];
            console.log(`Found PRs in release: ${uniquePRs.join(', ')}`);
            
            const date = new Date().toISOString().split('T')[0];
            let changelogContent = `## [${process.env.VERSION}] - ${date}\n\n`;
            let hasNotes = false;
            
            // Fetch the body of each PR and extract the release-note block or fallback to title
            for (const prNumber of uniquePRs) {
              try {
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                });
                
                const body = pr.body || "";
                const title = pr.title;
                const prUrl = pr.html_url; 
                
                const noteRegex = /```release-note\s*([\s\S]*?)```/;
                const noteMatch = body.match(noteRegex);
                
                let finalNote = "";
                
                if (noteMatch) {
                  const noteText = noteMatch[1].trim();
                  
                  if (noteText.toUpperCase() === 'NONE') {
                    // Explicitly ignored by the contributor
                    console.log(`PR #${prNumber} explicitly ignored via NONE.`);
                    continue; 
                  } else if (noteText) {
                    finalNote = noteText; // Uses the custom release note
                  } else {
                    finalNote = title; // Block exists but is empty, fallback to PR title
                  }
                } else {
                  finalNote = title; // No block found (e.g. old PRs), fallback to PR title
                }
                
                changelogContent += `* ${finalNote} (${prUrl})\n`;
                hasNotes = true;
                
              } catch (error) {
                console.error(`Failed to fetch PR #${prNumber}: ${error.message}`);
              }
            }
            
            if (!hasNotes) {
              changelogContent += "* No notable changes for this release.\n";
            }
            
            changelogContent += "\n---\n\n";
            
            // Save the parsed notes to a new file
            fs.writeFileSync('PARSED_CHANGELOG.md', changelogContent);

      - name: Create CHANGELOG PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          BRANCH_NAME="changelog-update-${VERSION}"
          
          # Check if an open PR already exists for this branch using GitHub CLI
          # Returns a JSON with the PR number and the author's login
          PR_INFO=$(gh pr list --head "$BRANCH_NAME" --state open --json number,author --jq '.[0]')
          
          # If the PR exists (not null and not empty)
          if [ "$PR_INFO" != "null" ] && [ -n "$PR_INFO" ]; then
            PR_AUTHOR=$(echo "$PR_INFO" | jq -r '.author.login')
            
            # Verify the PR author
            if [[ "$PR_AUTHOR" == *"github-actions"* ]]; then
              echo "✅ A PR for version ${VERSION} has already been created by the automation (Author: $PR_AUTHOR)."
              echo "⏭️ Skipping creation to ensure job idempotency."
              exit 0
            else
              echo "⚠️ A PR for version ${VERSION} has already been opened or modified manually by a human ($PR_AUTHOR)."
              echo "⏭️ Skipping execution to avoid overwriting maintainer work."
              exit 0
            fi
          fi
          
          # If no open PR is found, proceed with merging and creation
          echo "No open PR found. Starting creation..."
          
          cat PARSED_CHANGELOG.md CHANGELOG.md > temp_changelog.md
          mv temp_changelog.md CHANGELOG.md
          
          # Create the branch locally
          git checkout -b $BRANCH_NAME
          
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"
          git add CHANGELOG.md
          git commit -s -m "docs(release): update CHANGELOG for ${VERSION}"
          
          # Use push --force to ensure that if an orphaned remote branch exists without a PR, it gets updated
          git push origin $BRANCH_NAME --force
          
          # Open the PR
          gh pr create \
            --title "docs(release): update CHANGELOG for ${VERSION}" \
            --body "Automated PR to update the \`CHANGELOG.md\` with the latest release notes from ${VERSION}." \
            --base main \
            --label "area/documentation"
  promote:
    name: Promote Container Image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
        - tag_suffix: "" # distroless image
        - tag_suffix: "-ubi" # ubi image
        - tag_suffix: "-ubi-boringssl" # ubi image

    permissions:
      contents: write #to update the github release
      id-token: write #for keyless sign
      packages: write #to update packages with added SBOMs.

    env:
      SOURCE_TAG: ${{ github.event.inputs.source_ref }}${{ matrix.tag_suffix }}
      RELEASE_TAG: ${{ github.event.inputs.version }}${{ matrix.tag_suffix }}

    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        id: setup-go
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Download Go modules
        run: go mod download

      - name: Login to Docker
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote Container Image
        run: make docker.promote

      - name: Build release manifests
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: |
          # temporarily patch the version so we generate manifests with the new version
          yq e -i ".version = \"$RELEASE_VERSION\"" ./deploy/charts/external-secrets/Chart.yaml
          yq e -i ".appVersion = \"$RELEASE_VERSION\"" ./deploy/charts/external-secrets/Chart.yaml
          make manifests

      - name: Sign promoted image
        id: sign
        uses: ./.github/actions/sign
        with:
          image-name: ${{ env.IMAGE_NAME }}
          image-tag: ${{ env.RELEASE_TAG }}

      - name: Update Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: |
            provenance.${{ env.RELEASE_TAG }}.intoto.jsonl
            sbom.${{ env.RELEASE_TAG }}.spdx.json
            bin/deploy/manifests/external-secrets.yaml
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
